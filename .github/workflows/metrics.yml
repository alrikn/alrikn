name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Half-year calendar
        uses: lowlighter/metrics@latest
        with:
          filename: profile/metrics.isocalendar.halfyear.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          config_display: large
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Last 3 years calendar
        uses: lowlighter/metrics@latest
        with:
          filename: profile/metrics.plugin.calendar.full.svg
          token: ${{ secrets.METRICS_TOKEN }}
          config_display: large
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 3
          extras_css: |
            svg.calendar text { fill: #8b949e !important; }
            rect.day[fill="#ebedf0"] { fill: #161b22 !important; }
            rect.day[fill="#9be9a8"] { fill: #0e4429 !important; }
            rect.day[fill="#40c463"] { fill: #006d32 !important; }
            rect.day[fill="#30a14e"] { fill: #26a641 !important; }
            rect.day[fill="#216e39"] { fill: #39d353 !important; }

      - name: Featured star list
        uses: lowlighter/metrics@latest
        with:
          filename: profile/metrics.plugin.starlists.svg
          token: NOT_NEEDED
          base: ""
          plugin_starlists: yes
          plugin_starlists_limit_repositories: 10
          plugin_starlists_only: MyCoolProjects

      - name: Featured star list languages
        uses: lowlighter/metrics@latest
        with:
          filename: profile/metrics.plugin.starlists.languages.svg
          token: NOT_NEEDED
          base: ""
          plugin_starlists: yes
          plugin_starlists_languages: yes
          plugin_starlists_limit_languages: 8
          plugin_starlists_limit_repositories: 0
          plugin_starlists_only: MyCoolProjects

      - name: Update README with pin cards
        run: |
          python3 << 'EOF'
          import re

          with open('profile/metrics.plugin.starlists.svg', 'r') as f:
              content = f.read()

          repos = re.findall(r'<span>([^<\s]+/[^<\s]+)</span>', content)
          seen = set()
          unique_repos = []
          for repo in repos:
              if repo not in seen:
                  seen.add(repo)
                  unique_repos.append(repo)

          lines = []
          for i in range(0, len(unique_repos), 2):
              pair = unique_repos[i:i+2]
              for repo in pair:
                  owner, name = repo.split('/', 1)
                  url = f'https://github.com/{owner}/{name}'
                  img = f'https://github-stats-extended.vercel.app/api/pin/?username={owner}&repo={name}&theme=omni'
                  lines.append(f'<a href="{url}"><img src="{img}" /></a>')
              lines.append('')

          html = '\n'.join(lines).strip()

          with open('README.md', 'r') as f:
              readme = f.read()

          new_section = f'<!-- STARLISTS:START -->\n{html}\n<!-- STARLISTS:END -->'
          readme = re.sub(
              r'<!-- STARLISTS:START -->.*?<!-- STARLISTS:END -->',
              new_section,
              readme,
              flags=re.DOTALL
          )

          with open('README.md', 'w') as f:
              f.write(readme)

          print(f"Updated README.md with {len(unique_repos)} pin cards")
          EOF

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=omni&hide_border=false&include_all_commits=true&count_private=true
          path: profile/my_stats.svg
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=omni&hide_border=false&disable_animations=true
          path: profile/streak.svg
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --staged --quiet || git commit -m "Update stats cards - [Skip GitHub Action]"
          git pull --rebase origin main
          git push
